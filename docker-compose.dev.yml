# Override per sviluppo con hot-reload
version: '3.8'

services:
  api-gateway:
    volumes:
      # Hot reload per development
      - ./lifesuite-api-gateway:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    command: ["npm", "run", "dev"]

  budget-manager:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    # Per .NET il hot reload è più complesso, per ora rebuild manuale